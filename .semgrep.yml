# Semgrep configuration for GratisGIS.
#
# Usage (once Matt installs the CLI):
#   pip install semgrep
#   semgrep ci --config .semgrep.yml
#
# Or in CI: see the commented job below the rules section.
#
# Rule packs pulled from the Semgrep Registry (https://semgrep.dev/r):
#   - p/owasp-top-ten        Curated OWASP Top 10 ruleset.
#   - p/security-audit       Broader security-audit pack maintained by
#                            the Semgrep team.
#   - p/javascript           JS-specific issues (eval, dangerouslySetInnerHTML, etc.).
#   - p/typescript           TS-specific issues.
#   - p/nodejs               Node-specific issues (child_process,
#                            fs path traversal, etc.).
#   - p/nextjs               Next.js specific (SSRF in image proxy,
#                            unsafe rewrites).
#   - p/nestjs               NestJS specific (guards, decorators).
#   - p/docker               Dockerfile lints + security best practice.
#
# These pack names match Semgrep's published shortcuts at semgrep.dev/r.

rules:
  # Custom rule: catch ST_GeomFromGeoJSON with user-influenced input.
  # PostGIS will parse the JSON, but if the GeoJSON text was concatenated
  # from a request body we lose parameterization and open ourselves to
  # SQL injection or large-input DoS. Parameterized calls
  # (e.g. Prisma `$queryRaw` with `Prisma.sql` template) are fine; the
  # rule below flags string-concatenated SQL paths.
  - id: gratisgis-st-geomfromgeojson-tainted-input
    message: |
      ST_GeomFromGeoJSON() is being called with a value that looks
      like a string-concatenated or template-interpolated request
      input. Use parameter binding (Prisma.sql / $1 placeholders /
      raw input -> JSONB cast inside the query) so the GeoJSON text
      can't break out of its argument. Also size-limit the input
      before it reaches PostGIS.
    severity: ERROR
    languages: [typescript, javascript]
    metadata:
      category: security
      cwe:
        - "CWE-89: Improper Neutralization of Special Elements used in an SQL Command"
      owasp: "A03:2021 - Injection"
      technology: [postgis, postgres, sql]
    patterns:
      - pattern-either:
          # Backtick template literal containing ST_GeomFromGeoJSON(...)
          - pattern: |
              `... ST_GeomFromGeoJSON(${...}) ...`
          # String concatenation: '... ST_GeomFromGeoJSON(' + x + ...'
          - pattern: |
              "..." + $X + "...ST_GeomFromGeoJSON(..."
          - pattern: |
              "...ST_GeomFromGeoJSON(" + $X + "..."
          # .raw() / $queryRawUnsafe() with ST_GeomFromGeoJSON
          - pattern: |
              $DB.$queryRawUnsafe(`...ST_GeomFromGeoJSON(${...})...`, ...)
          - pattern: |
              $DB.$executeRawUnsafe(`...ST_GeomFromGeoJSON(${...})...`, ...)

extends:
  # Rule packs from the Semgrep Registry.
  - p/owasp-top-ten
  - p/security-audit
  - p/javascript
  - p/typescript
  - p/nodejs
  - p/nextjs
  - p/nestjs
  - p/docker

