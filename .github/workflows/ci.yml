name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: gratisgis
          POSTGRES_PASSWORD: devpassword
          POSTGRES_DB: gratisgis_ci
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U gratisgis -d gratisgis_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://gratisgis:devpassword@localhost:5432/gratisgis_ci?schema=public

    steps:
      - uses: actions/checkout@v6

      - name: Set up pnpm
        # No `version:` here -- pnpm/action-setup reads the version
        # from the `packageManager` field in root package.json
        # (pnpm@9.12.0). Specifying both triggers ERR_PNPM_BAD_PM_VERSION
        # and the runner dies before a single step can run.
        uses: pnpm/action-setup@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm --filter @gratis-gis/portal-api db:generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
