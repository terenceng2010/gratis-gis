# Dependabot configuration for GratisGIS.
#
# Notes for review:
# - pnpm support is via the npm ecosystem (Dependabot reads
#   pnpm-lock.yaml since Aug 2024); no separate "pnpm" ecosystem key
#   exists.
# - Grouped updates keep PR volume reasonable: one PR per ecosystem
#   per week instead of one PR per package.
# - All PRs are assigned to palavido-dev so they don't sit unowned.
# - Docker scanning lists each Dockerfile path explicitly because
#   Dependabot doesn't recurse on its own.
#
# Things to confirm before merging:
# - Reviewer handle palavido-dev is correct.
# - Day of week for runs (currently monday).
# - Whether you want major-version bumps grouped or split out (split
#   here, since majors usually need manual review).

version: 2

updates:
  # JS/TS dependencies (pnpm workspace at repo root)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "javascript"
    reviewers:
      - "palavido-dev"
    assignees:
      - "palavido-dev"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      # Major bumps get their own PR so they're easier to review.
    # Pin majors that need real review / migration work. Each entry
    # explains why we're not auto-tracking the major. Remove the
    # entry (or relax the version-spec) when we're ready to do the
    # upgrade work.
    ignore:
      # Node 22 is the current LTS we ship on; types should track
      # the engine, not race ahead.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      # Prisma 6.x and 7.x both have breaking changes (RawType,
      # schema-engine relocation). Stay on 5 until we have a
      # dedicated upgrade window.
      - dependency-name: "prisma"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@prisma/client"
        update-types: ["version-update:semver-major"]
      # MapLibre 5 dropped GL 1 backends and changed several
      # source / layer types; the map-canvas surface needs a real
      # audit before we take this.
      - dependency-name: "maplibre-gl"
        update-types: ["version-update:semver-major"]
      # TypeScript 6 is too fresh; stay on 5.x.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # cron 4 dropped CommonJS in favour of ESM-only; the schedule
      # services would need an import rewrite. Defer.
      - dependency-name: "cron"
        update-types: ["version-update:semver-major"]
      # Jest 30 needs a Vitest-or-stay-pinned decision. Defer.
      - dependency-name: "jest"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/jest"
        update-types: ["version-update:semver-major"]
      # eslint-config-next must move in lockstep with the Next.js
      # major. We're on Next 15; track the config to match.
      - dependency-name: "eslint-config-next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      # jwks-rsa 4 changed the cache API. Defer until we revisit
      # the JWT verification path.
      - dependency-name: "jwks-rsa"
        update-types: ["version-update:semver-major"]

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    labels:
      - "dependencies"
      - "github-actions"
    reviewers:
      - "palavido-dev"
    assignees:
      - "palavido-dev"
    commit-message:
      prefix: "chore(ci)"
    groups:
      actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Docker base images for portal-api
  - package-ecosystem: "docker"
    directory: "/apps/portal-api"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    labels:
      - "dependencies"
      - "docker"
    reviewers:
      - "palavido-dev"
    assignees:
      - "palavido-dev"
    commit-message:
      prefix: "chore(docker)"
    groups:
      docker-api:
        patterns:
          - "*"
    # Node 22 LTS is what we build against. A jump to 24 / 26 needs
    # a coordinated runtime change (gdal-async prebuilt binaries,
    # `engines` in every workspace, prod box update).
    ignore:
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]

  # Docker base images for portal-web
  - package-ecosystem: "docker"
    directory: "/apps/portal-web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    labels:
      - "dependencies"
      - "docker"
    reviewers:
      - "palavido-dev"
    assignees:
      - "palavido-dev"
    commit-message:
      prefix: "chore(docker)"
    groups:
      docker-web:
        patterns:
          - "*"
    # See portal-api block: Node major bumps are coordinated, not
    # auto-merged.
    ignore:
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]

  # Docker base image for the custom postgres image under infra/
  - package-ecosystem: "docker"
    directory: "/infra/postgres"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    labels:
      - "dependencies"
      - "docker"
      - "infra"
    reviewers:
      - "palavido-dev"
    assignees:
      - "palavido-dev"
    commit-message:
      prefix: "chore(infra)"
    groups:
      docker-infra:
        patterns:
          - "*"
    # A Postgres major (16 -> 17) is a data migration, not a base-
    # image bump. Pin until we're ready to schedule a pg_upgrade
    # against prod.
    ignore:
      - dependency-name: "postgis/postgis"
        update-types: ["version-update:semver-major"]
