name: gratis-gis

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: gratis-gis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gratisgis
      POSTGRES_USER: gratisgis
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/10-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gratisgis -d gratisgis"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: gratis-gis-keycloak
    restart: unless-stopped
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME: localhost
      KC_HTTP_ENABLED: "true"
      KC_DB: dev-mem
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/realm-gratis-gis.json:/opt/keycloak/data/import/realm-gratis-gis.json:ro

  minio:
    image: minio/minio:RELEASE.2024-10-02T17-50-41Z
    container_name: gratis-gis-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: gratisgis
      MINIO_ROOT_PASSWORD: devpassword
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  pg_tileserv:
    image: pramsey/pg_tileserv:latest
    container_name: gratis-gis-pg_tileserv
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://gratisgis:devpassword@postgres:5432/gratisgis
    ports:
      - "7800:7800"

volumes:
  pgdata:
  miniodata:
