name: gratis-gis-prod

# Production stack for gratisgis.org. Distinct from
# infra/docker-compose.yml (the dev stack) on every axis that matters:
#
#   - No public ports except Caddy on 80/443. Postgres, Keycloak,
#     MinIO, pg_tileserv, and the apps all live on the internal
#     `gratis-net` network and are only reachable through the proxy.
#   - Keycloak runs in production mode (`start --optimized`), not
#     `start-dev`, with a real PostgreSQL store rather than dev-file.
#   - portal-api and portal-web are built from source via the
#     repo-root Dockerfiles. The build context is the repo root so
#     the workspace deps resolve.
#   - All secrets come from infra/.env.prod (gitignored). See
#     infra/.env.prod.example for the required keys.
#   - Caddy holds the only TLS certs; renewal is fully automatic via
#     Let's Encrypt. The certs persist in the caddy-data volume so
#     restarts don't re-fetch.
#
# Day-to-day usage from the box:
#
#   cd /opt/gratis-gis
#   docker compose -f infra/docker-compose.prod.yml --env-file infra/.env.prod up -d --build
#   docker compose -f infra/docker-compose.prod.yml logs -f
#
# Or, with the deploy.sh helper:
#   ./infra/deploy.sh

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: gratis-gis-prod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gratisgis}
      POSTGRES_USER: ${POSTGRES_USER:-gratisgis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env.prod}
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:?KEYCLOAK_DB_PASSWORD must be set in .env.prod}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-prod-db.sql:/docker-entrypoint-initdb.d/10-init.sql:ro
      - ./init-prod-db.sh:/docker-entrypoint-initdb.d/20-init-keycloak-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gratisgis} -d ${POSTGRES_DB:-gratisgis}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - gratis-net

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: gratis-gis-prod-keycloak
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    # Production mode with realm import on first boot. The realm JSON
    # is materialized by deploy.sh from realm-gratis-gis.prod.json.tmpl
    # via envsubst so hostnames + secrets land in the right shape.
    # --import-realm is a no-op when the realm already exists.
    command:
      - start
      - --http-enabled=true
      - --proxy-headers=xforwarded
      - --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:?KEYCLOAK_DB_PASSWORD must be set in .env.prod}
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME:-auth.gratisgis.org}
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD must be set in .env.prod}
      # JVM ceiling. The host has 7.6 GB; capping Keycloak at 1 GB
      # leaves room for Postgres + the two app containers without
      # pressure. Bump if Keycloak starts hitting memory under load.
      JAVA_OPTS_APPEND: -Xms256m -Xmx1024m
    volumes:
      - ./keycloak/themes/portal:/opt/keycloak/themes/portal:ro
      # Realm-import directory. deploy.sh writes the substituted realm
      # JSON here before bringing keycloak up. Keycloak picks up every
      # *.json on first start when --import-realm is passed.
      - ./keycloak/import:/opt/keycloak/data/import:ro
    networks:
      - gratis-net

  minio:
    # Pin a recent MinIO. Earlier 2024 releases reject the
    # x-amz-sdk-checksum-algorithm header that AWS SDK v3 sends by
    # default on PUT / CreateBucket, with "A header you provided
    # implies functionality that is not implemented". The April 2025
    # release we used initially also rejected the same header on
    # PUT-Bucket-CORS / PUT-Bucket-Policy specifically (admin
    # operations send the header but the surface there hadn't caught
    # up). The September 2025 release accepts it everywhere we use,
    # so bucket bootstrap (HeadBucket / PutBucketPolicy /
    # PutBucketCors) and presigned PUTs both succeed without the
    # WHEN_REQUIRED opt-out alone needing to do all the work.
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: gratis-gis-prod-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER must be set in .env.prod}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set in .env.prod}
      # Server-level CORS allowlist. Mirrors the per-bucket CORS rule
      # the api would otherwise install via PutBucketCorsCommand --
      # but that command path triggers MinIO's "header you provided
      # implies functionality not implemented" rejection on every
      # MinIO release we've tried (server flips between accepting
      # and rejecting x-amz-sdk-checksum-algorithm headers across
      # releases). Setting it on the server side sidesteps the
      # per-bucket dance entirely. Leave the bucket-policy install
      # in the api alone -- it works -- this only replaces the CORS
      # piece. Multiple origins go in as a comma-separated list.
      MINIO_API_CORS_ALLOW_ORIGIN: ${PUBLIC_URL:-https://gratisgis.org}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gratis-net

  pg_tileserv:
    image: pramsey/pg_tileserv:latest
    container_name: gratis-gis-prod-pg_tileserv
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-gratisgis}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-gratisgis}
    networks:
      - gratis-net

  portal-api:
    image: gratis-gis/portal-api:latest
    container_name: gratis-gis-prod-portal-api
    build:
      context: ..
      dockerfile: apps/portal-api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
      minio:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: "4000"
      DATABASE_URL: postgresql://${POSTGRES_USER:-gratisgis}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-gratisgis}
      # Token issuer side: KEYCLOAK_URL is the public-facing Keycloak
      # base, used both as the JWT issuer prefix and as the JWKS
      # fetch root. The api code reads this via process.env.KEYCLOAK_URL
      # in src/auth/jwt.strategy.ts.
      KEYCLOAK_URL: https://${AUTH_DOMAIN:-auth.gratisgis.org}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-gratis-gis}
      # Service-account credentials for the api's admin operations
      # (user reconcile, password reset, role mutation). Matches the
      # portal-api-admin client in the realm import.
      KEYCLOAK_ADMIN_CLIENT_ID: ${KEYCLOAK_ADMIN_CLIENT_ID:-portal-api-admin}
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET:?KEYCLOAK_ADMIN_CLIENT_SECRET must be set in .env.prod}
      # AES-256-GCM master key for credential-at-rest encryption.
      # Used for stored item credentials (#36) and the SMTP password
      # in admin Notifications. Generate with:
      #   openssl rand -base64 32
      # If this is rotated after-the-fact, every encrypted row in
      # item_credential and system_setting becomes unreadable -- treat
      # it as effectively immutable once set.
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:?CREDENTIAL_ENCRYPTION_KEY must be set in .env.prod}
      # MinIO / S3. Variable names match what storage.service.ts /
      # backup.service.ts read; no S3_* aliases.
      #
      # The endpoint has to be the PUBLIC hostname because the S3
      # SDK bakes it into presigned URLs and signature v4 covers the
      # Host header. The api hairpins back through Caddy for the
      # admin-style operations (HeadBucket, PutBucketPolicy,
      # PutBucketCors), which is fine: those run at boot, not per
      # request. Per-request work (presigning) is just URL
      # manipulation in-process and never round-trips to MinIO.
      MINIO_ENDPOINT: https://${STORAGE_DOMAIN:-storage.gratisgis.org}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${S3_BUCKET:-gratisgis}
      # Browser-facing MinIO base. Same hostname as MINIO_ENDPOINT,
      # both because there's no CDN in front and because the
      # presigned URLs we hand back ARE built off this. Saving
      # publicUrl as a relative MINIO_PUBLIC_BASE here would just
      # duplicate the host the SDK already embedded.
      MINIO_PUBLIC_BASE: https://${STORAGE_DOMAIN:-storage.gratisgis.org}
      # Origins the browser is allowed to PUT from. The bucket CORS
      # rule we install at boot opens this list. Keep it tight: only
      # the portal-web origin (apex) needs cross-origin access.
      STORAGE_ALLOWED_ORIGINS: ${PUBLIC_URL:-https://gratisgis.org}
      # Backup archives. The runtime image pre-creates this with
      # app:app ownership so the named volume below inherits it.
      BACKUP_DIR: /app/backups
      # Public URL for redirects + OG metadata.
      PUBLIC_URL: ${PUBLIC_URL:-https://gratisgis.org}
    volumes:
      - portal-api-backups:/app/backups
    networks:
      - gratis-net
    # No public port. Caddy talks to it as `portal-api:4000`.

  portal-web:
    image: gratis-gis/portal-web:latest
    container_name: gratis-gis-prod-portal-web
    build:
      context: ..
      dockerfile: apps/portal-web/Dockerfile
      args:
        # #274: NEXT_PUBLIC_* vars must be present at build time so
        # Next.js inlines them into the client bundle. Setting these
        # only in `environment:` below would not reach the static
        # output that the standalone server serves.
        # Defaults to "1" for the canonical gratisgis.org deploy so
        # the open-source project section renders below the Hero. A
        # per-tenant fork can pass PROJECT_LANDING= in .env.prod (or
        # explicitly export PROJECT_LANDING=0) to suppress it.
        NEXT_PUBLIC_PROJECT_LANDING: ${PROJECT_LANDING:-1}
        NEXT_PUBLIC_GITHUB_REPO: ${GITHUB_REPO:-palavido-dev/gratis-gis}
    restart: unless-stopped
    depends_on:
      portal-api:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: "3000"
      # Server-side fetch target. apps/portal-web/src/lib/api.ts and
      # the BFF route handler both read PORTAL_API_URL when running
      # on the server. Hits the api over the internal docker network
      # (no TLS hop, no Caddy round-trip).
      PORTAL_API_URL: http://portal-api:4000
      # Browser-side fetch target. Routed through Caddy under /api/.
      NEXT_PUBLIC_API_URL: ${PUBLIC_URL:-https://gratisgis.org}
      # NextAuth: must match the public Keycloak issuer so iss claim
      # validates. NEXTAUTH_URL is the canonical public app URL.
      NEXTAUTH_URL: ${PUBLIC_URL:-https://gratisgis.org}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET must be set in .env.prod}
      # The web's auth.ts builds the issuer from KEYCLOAK_URL +
      # KEYCLOAK_REALM (it is not the same as the api's
      # KEYCLOAK_ISSUER variable). Public URL on purpose -- the JWT
      # iss claim has to match this for token validation to work,
      # and the discovery doc fetch runs from the container out
      # through the public DNS hairpin.
      KEYCLOAK_URL: https://${AUTH_DOMAIN:-auth.gratisgis.org}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-gratis-gis}
      # Carried for compat with anything else that reads it.
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-https://auth.gratisgis.org/realms/gratis-gis}
      # NextAuth's Keycloak provider reads these names verbatim
      # (apps/portal-web/src/lib/auth.ts). portal-web is a public
      # client with PKCE in the realm; the secret here is the empty
      # string but we still need the env var present for the provider
      # to register.
      KEYCLOAK_CLIENT_ID_WEB: ${KEYCLOAK_CLIENT_ID:-portal-web}
      KEYCLOAK_CLIENT_SECRET_WEB: ${KEYCLOAK_CLIENT_SECRET:-}
    networks:
      - gratis-net

  caddy:
    image: caddy:2-alpine
    container_name: gratis-gis-prod-caddy
    restart: unless-stopped
    depends_on:
      portal-web:
        condition: service_started
      keycloak:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Surfaced as {$PORTAL_DOMAIN} / {$AUTH_DOMAIN} in the Caddyfile so
      # we can reuse the same file in staging if we ever want.
      PORTAL_DOMAIN: ${PORTAL_DOMAIN:-gratisgis.org}
      AUTH_DOMAIN: ${AUTH_DOMAIN:-auth.gratisgis.org}
      STORAGE_DOMAIN: ${STORAGE_DOMAIN:-storage.gratisgis.org}
      ACME_EMAIL: ${ACME_EMAIL:?ACME_EMAIL must be set in .env.prod}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - gratis-net

volumes:
  pgdata:
  miniodata:
  caddy-data:
  caddy-config:
  portal-api-backups:

networks:
  gratis-net:
    driver: bridge
