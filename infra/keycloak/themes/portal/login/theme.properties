# Portal login theme — a lightweight skin over Keycloak's built-in
# login theme. We inherit all of keycloak.v2's FTL templates so every
# flow (login, register, forgot-password, required-actions, OAuth
# consent, IdP linking) continues to work; we just layer our own
# stylesheet on top and swap the displayed brand.
#
# If we ever want to heavily diverge, add .ftl overrides next to this
# file — Keycloak resolves them relative to this theme and falls
# through to the parent for anything we don't define.

parent=keycloak.v2
import=common/keycloak

# Stylesheets are appended after the parent's, so our rules win.
styles=css/login.css

# Localization — shows in the card header. The realm's displayName
# takes precedence; this is the fallback.
locales=en
